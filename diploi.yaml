diploiVersion: v1.0
type: component
name: Laravel
description: Official Diploi component for Laravel

supportsAdditionalHosts: { serviceName: 'app'}

parameterGroups:
  - name: Laravel Environment Variables
    identifier: LARAVEL_ENV
    description: Laravel application environment variables
    parameters:
      - name: AppName
        identifier: APP_NAME
        defaultValue: Laravel
        type: string
      - name: AppKey
        identifier: APP_KEY
        defaultValue: "base64:${generate-random-bytes:32}"
        type: secret
        description: Laravel application encryption key

hosts:
  - name: Laravel
    identifier: app
    port: 8000
  - name: Vite
    identifier: vite
    port: 5173
images:
  - identifier: app
    prebuildImage: public.ecr.aws/p8t2q7f4/diploi/component-laravel:[tag]
