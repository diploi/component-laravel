apiVersion: apps/v1
{{- if eq .Values.stage "development"}}
kind: StatefulSet
{{- else }}
kind: Deployment
{{- end }}
metadata:
  name: app
  labels:
    app: app
spec:
  selector:
    matchLabels:
      app: app
  {{- if eq .Values.stage "development"}}
  serviceName: app
  {{- else }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  {{- end }}
  replicas: {{ ternary 1 0 .Values.enabled }}
  template:
    metadata:
      labels:
        app: app
    spec:
      terminationGracePeriodSeconds: 10
      imagePullSecrets:
        - name: diploi-pull-secret
      {{- if eq .Values.stage "development"}}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        - name: install-dependencies
          image: {{ .Values.images.app }}
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              composer install --optimize-autoloader --no-interaction
              if [ -f package.json ]; then
                npm ci || npm install
              fi
          workingDir: /app{{ .Values.folder }}
          volumeMounts:
            - name: app-mount
              mountPath: /app
        - name: migrate-database
          image: {{ .Values.images.app }}
          imagePullPolicy: Always
          env:
          {{- $envMap := (get .Values "envMap" | default (dict)) }}

          {{- with (get $envMap "DB_CONNECTION") }}
          - name: DB_CONNECTION
            value: {{ .value | quote }}
          {{- end }}

          {{- with (get $envMap "DB_HOST") }}
          - name: DB_HOST
            value: {{ .value | quote }}
          {{- end }}

          {{- with (get $envMap "DB_PORT") }}
          - name: DB_PORT
            value: {{ .value | quote }}
          {{- end }}

          {{- with (get $envMap "DB_DATABASE") }}
          - name: DB_DATABASE
            value: {{ .value | quote }}
          {{- end }}

          {{- with (get $envMap "DB_USERNAME") }}
          - name: DB_USERNAME
            value: {{ .value | quote }}
          {{- end }}

          {{- with (get $envMap "DB_PASSWORD") }}
          - name: DB_PASSWORD
            value: {{ .value | quote }}
          {{- end }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Clearing config cache..."
              php artisan config:clear && rm -f bootstrap/cache/config.php

              if [ -z "${DB_CONNECTION}" ]; then
                echo "DB_CONNECTION is empty, skipping migrations."
                exit 0
              fi

              echo "Running database migrations for ${DB_CONNECTION}..."

              if php artisan migrate --force; then
                echo "✅ Migrations completed successfully"
              else
                echo "❌ Migration FAILED! Check database connection, schema, or .env"
                exit 1
              fi
          workingDir: /app{{ .Values.folder }}
          volumeMounts:
            - name: app-mount
              mountPath: /app
        
        - name: generate-passport-keys
          image: {{ .Values.images.app }}
          imagePullPolicy: Always
          command: 
            - /bin/sh
            - -c
            - |
              if [ ! -d vendor/laravel/passport ]; then
                echo "laravel/passport is not installed, skipping key generation."
                exit 0
              fi

              if [ ! -f storage/oauth-private.key ] || [ ! -f storage/oauth-public.key ]; then
                echo "Generating Laravel Passport keys..."
                if php artisan passport:keys --force; then
                  echo "Passport keys generated successfully."
                else
                  echo "Passport key generation failed."
                  exit 1
                fi
              else
                echo "Passport keys already exist, skipping generation."
              fi
          workingDir: /app{{ .Values.folder }}
          volumeMounts:
            - name: app-mount
              mountPath: /app


      {{- end }}
      containers:
        - name: app
          image: {{ .Values.images.app }}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          {{- if eq .Values.stage "development" }}
          workingDir: /app{{ .Values.folder }}
          {{- with .Values.containerCommands.developmentStart }}
          command:
            - /bin/sh
            - -c
            - |
          {{ . | nindent 14 }}
          {{- end }}
          {{- else }}
          {{- with .Values.containerCommands.productionStart }}
          command:
            - /bin/sh
            - -c
            - |
          {{ . | nindent 14 }}
          {{- end }}
          {{- end }}
          env:
            - name: __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS
              value: .diploi.me
            {{- range .Values.env }}
            - name: {{ .identifier }}
              value: {{ .value | quote }}
            {{- end }}
            - name: APP_PUBLIC_URL
              value: {{ .Values.hosts.app }}
            - name: STAGE
              value: {{ .Values.stage }}
            - name: LOG_CHANNEL
              value: "stderr"
          volumeMounts:
            {{- if hasKey .Values.storage "code" }}
            - name: app-mount
              mountPath: /app
            {{- end }}
      volumes:
        {{- if hasKey .Values.storage "code" }}
        - name: app-mount
          hostPath:
            path: {{ .Values.storage.code.hostPath }}
        {{- end }}
